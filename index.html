<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Ivan Caldarella">
  <meta name="description" content="Riproduzione di TikTok">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">
      <p class="head-icon hi-left">
        <i class="bi bi-play-btn"></i>
      </p>
      <div class="head-icon page-selector">
        <p class="page page0">Esplora</p>
        <p class="page page1">Seguiti</p>
        <p class="page page2">Per te</p>
      </div>
      <p class="head-icon hi-right">
        <i class="bi bi-search"></i>
      </p>
    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-item si-0">
        <div class="boolean-logo">
          <img src="./assets/img/boolean_logo.png" alt="logo boolean" id="logo-img">
        </div>
        <div class="add-icon"></div>
      </div>
      <div class="sidebar-item si-1">
        <div class="heart-icon big-icon">
          <i class="bi bi-heart-fill"></i>
        </div>
        <p class="heart-number">588</p>
      </div>
      <div class="sidebar-item si-2">
        <div class="comment-icon big-icon">
          <i class="bi bi-chat-dots-fill"></i>
        </div>
        <p class="comment-number">13</p>
      </div>
      <div class="sidebar-item si-3">
        <div class="save-icon big-icon">
          <i class="bi bi-bookmark-fill"></i>
        </div>
        <p class="save-number">638</p>
      </div>
      <div class="sidebar-item si-4">
        <div class="share-icon big-icon">
          <i class="bi bi-sign-turn-slight-right-fill"></i>
        </div>
        <p class="share-number">491</p>
      </div>
    </div>
    <!-- Footer -->
    <footer class="reel-footer">
      <div class="foot-button home-b">
        <div class="home-icon">
          <i class="bi bi-house-fill"></i>
        </div>
        <p class="home-text">Home</p>
      </div>
      <div class="foot-button friend-b">
        <div class="friend-icon">
          <i class="bi bi-people"></i>
        </div>
        <p class="friend-text">Amici</p>
      </div>
      <div class="foot-button add-reel-b">
        <div class="add-reel-icon">+</div>
      </div>
      <div class="foot-button mail-b">
        <!-- Aggiungo la notifica "19" dal css -->
        <div class="mail-icon">
          <i class="bi bi-chat-square"></i>
        </div>
        <p class="mail-text">Posta in arrivo</p>
      </div>
      <div class="foot-button profile-b">
        <div class="profile-icon">
          <i class="bi bi-person"></i>
        </div>
        <p class="profile-text">Profilo</p>
      </div>
    </footer>
  </div>

</body>

</html>
